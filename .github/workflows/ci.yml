name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch
        run: pip install --index-url https://download.pytorch.org/whl/cpu "torch>=2.1"

      - name: Install package
        run: pip install -e ".[dev,api,ai]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (types)
        run: mypy src

      - name: Pytest
        run: pytest -q --cov=lstm_forecast --cov-report=term-missing

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f docker/Dockerfile.api -t lstm-forecast-api .
      - name: Build dashboard image
        run: docker build -f docker/Dockerfile.dashboard -t lstm-forecast-dashboard .
